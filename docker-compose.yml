services:
  postgres:
    image: postgres:16
    container_name: tryon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tryon_db
      POSTGRES_USER: tryon_user
      POSTGRES_PASSWORD: tryon_password
    ports:
      - "55432:5432"
    volumes:
      - tryon_postgres_data_v2:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tryon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  tryon_postgres_data_v2: