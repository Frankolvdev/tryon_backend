services:
  prometheus:
    image: prom/prometheus:latest
    container_name: tryon_prometheus

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - tryon_prometheus_data:/prometheus

    ports:
      - "9090:9090"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    container_name: tryon_alertmanager

    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager

    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - tryon_alertmanager_data:/alertmanager

    ports:
      - "9093:9093"

    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tryon_grafana

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: change-this-password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"

    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - tryon_grafana_data:/var/lib/grafana

    ports:
      - "3001:3000"

    restart: unless-stopped

    depends_on:
      - prometheus

volumes:
  tryon_prometheus_data:
  tryon_alertmanager_data:
  tryon_grafana_data: