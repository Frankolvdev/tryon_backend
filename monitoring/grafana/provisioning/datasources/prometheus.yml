apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    uid: tryon-prometheus
    type: prometheus
    access: proxy

    url: http://prometheus:9090

    isDefault: true
    editable: true

    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: 3.0.0
      cacheLevel: High
      incrementalQuerying: true
      incrementalQueryOverlapWindow: 10m